<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="flex items-center justify-center h-screen bg-gray-100">

<div class="bg-white p-8 rounded-xl shadow-lg w-96">

    <h2 class="text-2xl font-bold text-center mb-4">Welcome Back</h2>

    <!-- GOOGLE LOGIN -->
    <a href="/login/google"
       class="w-full flex items-center justify-center border py-3 rounded mb-3 hover:bg-gray-50">

        <img src="https://developers.google.com/identity/images/g-logo.png"
             width="20" class="mr-2">

        Continue with Google
    </a>

    <div class="text-center text-gray-400 text-sm mb-3">OR</div>

    <!-- 🔥 FORM START -->
    <form action="/login" method="POST">

        <input type="email" name="email" placeholder="Email"
            class="w-full border p-3 rounded mb-3" required>

        <input type="password" name="password" placeholder="Password"
            class="w-full border p-3 rounded mb-3" required>

        <button type="submit"
            class="w-full bg-blue-600 text-white py-3 rounded">
            Sign In
        </button>

    </form>
    <!-- 🔥 FORM END -->

    <p class="text-center mt-3 text-sm">
        Don't have account?
        <a href="/register" class="text-blue-600">Signup</a>
    </p>

</div>

</body>
</html>
